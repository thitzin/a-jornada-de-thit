<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Jornada de Thit</title>
<style>
    :root{--bg-darkest:#1e1f22;--bg-dark:#2b2d31;--bg-primary:#313338;--bg-elevated:#383a40;
      --bg-hover:rgba(78,80,88,.35);--bg-active:rgba(78,80,88,.6);--text-header:#f2f3f5;
      --text-normal:#dbdee1;--text-muted:#949ba4;--text-faint:#6d6f78;--text-link:#00a8fc;
      --brand:#5865f2;--border-subtle:#26272b;--border-soft:#3f4147;
      --font-ui:"gg sans","Segoe UI","Helvetica Neue",Arial,sans-serif;--font-code:Consolas,"Courier New",monospace;}
    *{box-sizing:border-box}html,body{height:100%;margin:0}
    body{font-family:var(--font-ui);background:var(--bg-darkest);color:var(--text-normal);overflow:hidden}
    ::-webkit-scrollbar{width:10px}::-webkit-scrollbar-thumb{background:var(--bg-darkest);border-radius:8px;border:2px solid var(--bg-primary)}
    #app{display:flex;flex-direction:column;height:100vh}
    #topbar{height:48px;min-height:48px;background:var(--bg-dark);border-bottom:1px solid var(--border-subtle);
      display:flex;align-items:center;padding:0 16px;font-weight:700;color:var(--text-header);font-size:15px;gap:10px}
    .topbar-logo-img{height:28px;width:auto;flex-shrink:0;border-radius:4px}
    #main-layout{flex:1;display:flex;min-height:0}
    #left-sidebar{width:288px;min-width:288px;background:var(--bg-dark);overflow-y:auto;padding:16px 8px}
    .sidebar-section-header{padding:0 8px 6px;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text-muted)}
    .chapters-list{list-style:none;margin:0;padding:0}
    .chapter-item{display:flex;align-items:center;gap:6px;padding:6px 8px;margin:1px 0;border-radius:4px;
      color:var(--text-muted);font-size:15px;font-weight:500;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chapter-item:hover{background:var(--bg-hover);color:var(--text-header)}
    .chapter-item.active{background:var(--bg-active);color:var(--text-header)}
    .chapter-item.nested{padding-left:18px}
    .chapter-item.hidden-by-collapse{display:none}
    .chapter-hash{color:var(--text-faint);font-weight:600}
    .category-header{display:flex;align-items:center;gap:4px;padding:14px 6px 4px;font-size:12px;font-weight:700;
      letter-spacing:.02em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;user-select:none}
    .category-header:hover{color:var(--text-header)}
    .category-chevron{display:inline-block;transition:transform .1s ease;font-size:10px}
    .category-header.collapsed .category-chevron{transform:rotate(-90deg)}
    #chat-area{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg-primary)}
    #channel-header{height:48px;min-height:48px;display:flex;align-items:center;gap:8px;padding:0 16px;
      border-bottom:1px solid var(--border-subtle);font-weight:700;color:var(--text-header)}
    .channel-hash{color:var(--text-faint);font-size:20px;font-weight:600}
    #channel-topic{margin-left:8px;padding-left:12px;border-left:1px solid var(--border-soft);font-size:13px;font-weight:400;color:var(--text-muted)}
    .reader-messages{flex:1;overflow-y:auto;padding:16px 16px 48px;display:flex;flex-direction:column}
    .message-group{display:flex;gap:16px;padding:2px 8px;margin-top:17px;border-radius:4px}
    .message-group:first-child{margin-top:4px}
    .message-group-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:var(--brand);
      display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:15px;
      background-size:cover;background-position:center}
    .message-group-body{flex:1;min-width:0}
    .message-group-header{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
    .message-author-name{font-size:16px;font-weight:600}
    .message-author-tag{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;background:var(--bg-elevated);
      color:var(--text-muted);text-transform:uppercase}
    .message-content{font-size:15px;line-height:1.375rem;color:var(--text-normal);word-wrap:break-word;white-space:pre-wrap}
    .message-content strong{font-weight:700;color:var(--text-header)}
    .message-content em{font-style:italic}.message-content u{text-decoration:underline}.message-content s{text-decoration:line-through}
    .message-content a{color:var(--text-link);text-decoration:none}.message-content a:hover{text-decoration:underline}
    .message-content code.inline-code{background:var(--bg-darkest);border:1px solid var(--border-soft);padding:1px 4px;
      border-radius:3px;font-family:var(--font-code);font-size:.85em}
    .message-content pre.code-block{background:var(--bg-darkest);border:1px solid var(--border-soft);border-radius:4px;
      padding:10px 12px;margin:4px 0;overflow-x:auto}
    .message-content pre.code-block code{font-family:var(--font-code);font-size:.85em;white-space:pre}
    .message-content .subtext{display:inline;font-size:12px;color:var(--text-faint)}
    .spoiler{background:var(--bg-elevated);color:transparent;border-radius:3px;cursor:pointer;padding:0 2px;user-select:none}
    .spoiler.revealed{background:var(--bg-hover);color:var(--text-normal);user-select:text}
    .illustration-block{display:flex;flex-direction:column;align-items:center;margin:24px 0;padding:12px 0}
    .illustration-block img{max-width:min(560px,100%);max-height:70vh;width:auto;border-radius:8px;
      box-shadow:0 4px 18px rgba(0,0,0,.4);display:block}
    .illustration-caption{margin-top:10px;font-size:13px;font-style:italic;color:var(--text-muted);text-align:center;max-width:420px}
    .empty-state{margin:auto;text-align:center;color:var(--text-muted)}
    .loading-hint{margin:auto;color:var(--text-faint);font-size:13px}
    .load-more-wrap{display:flex;justify-content:center;padding:16px 0 28px}
    .reader-load-btn{padding:8px 16px;font-size:12px;font-weight:600;background:var(--bg-elevated);
      color:var(--text-normal);border:none;border-radius:4px;cursor:pointer}
    .reader-load-btn:hover{background:var(--bg-hover)}
    @media (max-width:860px){
      #left-sidebar{position:absolute;z-index:20;height:calc(100vh - 48px);left:-288px;transition:left .15s ease;width:288px}
      #left-sidebar.mobile-open{left:0;box-shadow:4px 0 16px rgba(0,0,0,.4)}
    }
  </style>
</head>

0vNR5m+bRAAAAABJRU5ErkJggg==" alt="Logo" class="topbar-logo-img">
    <span>A Jornada de Thit</span>
  </header>
  <div id="main-layout">
    <aside id="left-sidebar">
      <div class="sidebar-section-header">Episódios</div>
      <ul class="chapters-list"><li class="loading-hint" style="padding:8px">Carregando…</li></ul>
    </aside>
    <main id="chat-area">
      <div id="channel-header">
        <span class="channel-hash">#</span>
        <span id="channel-title"></span>
        <span id="channel-topic"></span>
      </div>
      <div id="reader-messages" class="reader-messages">
        <div class="loading-hint">Carregando…</div>
      </div>
    </main>
  </div>
</div>
<script>
var CHAPTERS_INDEX = [];
var CHARACTERS_MAP = {};
var episodeCache = {};
var activeChapterId = null;
var READER_BATCH_SIZE = 300;
var visibleCount = READER_BATCH_SIZE;
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function initials(name){return name ? name.trim().charAt(0).toUpperCase() : '?';}
function getCharacterById(id){return CHARACTERS_MAP[id] || null;}
function avatarStyle(ch){if(ch&&ch.avatar)return "background-image:url('"+ch.avatar+"');";return 'background-color:'+((ch&&ch.color)||'#5865f2')+';';}
function parseFormatting(raw){
  var text = escapeHtml(raw); var placeholders = [];
  function stash(html){ var token = '\u0000'+placeholders.length+'\u0000'; placeholders.push(html); return token; }
  text = text.replace(/```([\s\S]+?)```/g, function(m, code){ var cleaned = code.replace(/^[a-zA-Z0-9_-]*\n/, ''); return stash('<pre class="code-block"><code>'+cleaned+'</code></pre>'); });
  text = text.replace(/`([^`\n]+?)`/g, function(m, code){ return stash('<code class="inline-code">'+code+'</code>'); });
  text = text.replace(/\\([\\*_~`|[\]()])/g, function(m, ch){ return stash(ch); });
  text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, function(m,label,url){ return '<a href="'+url+'" target="_blank" rel="noopener noreferrer">'+label+'</a>'; });
  text = text.replace(/\|\|([\s\S]+?)\|\|/g, function(m, inner){ return '<span class="spoiler" role="button" tabindex="0" title="Clique para revelar">'+inner+'</span>'; });
  text = text.replace(/\*\*([\s\S]+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__([\s\S]+?)__/g, '<u>$1</u>');
  text = text.replace(/~~([\s\S]+?)~~/g, '<s>$1</s>');
  text = text.replace(/\*([^\n*]+?)\*/g, '<em>$1</em>');
  text = text.replace(/\u0000(\d+)\u0000/g, function(m,i){ return placeholders[Number(i)]; });
  text = text.replace(/-#([^\n]+?)-#/g, '<span class="subtext">$1</span>');
  text = text.replace(/\n/g, '<br>');
  return text;
}
function renderMessagesBatch(messages, visibleN){
  if (!messages || messages.length===0) return '<div class="empty-state">Este episódio ainda está vazio.</div>';
  var total = messages.length;
  var msgs = messages.slice(0, visibleN);
  var blocks = [];
  msgs.forEach(function(item){
    if (item.type === 'image'){ blocks.push({kind:'image', item:item}); }
    else {
      var last = blocks[blocks.length-1];
      if (last && last.kind==='group' && last.characterId===item.characterId){ last.lines.push(item); }
      else { blocks.push({kind:'group', characterId:item.characterId, lines:[item]}); }
    }
  });
  var html = '';
  blocks.forEach(function(block){
    if (block.kind === 'image'){
      var img = block.item;
      html += '<div class="illustration-block"><img src="'+escapeHtml(img.url)+'" alt="'+escapeHtml(img.caption||'Ilustração')+'" loading="lazy">' + (img.caption ? '<div class="illustration-caption">'+escapeHtml(img.caption)+'</div>' : '') + '</div>';
    } else {
      var character = getCharacterById(block.characterId);
      var name = character ? character.name : 'Personagem removido';
      var color = character ? character.color : '#949ba4';
      html += '<div class="message-group"><div class="message-group-avatar" style="'+avatarStyle(character)+'">' + ((character && character.avatar) ? '' : initials(name)) + '</div><div class="message-group-body"><div class="message-group-header"><span class="message-author-name" style="color:'+color+'">'+escapeHtml(name)+'</span>' + ((character && character.tag) ? '<span class="message-author-tag">'+escapeHtml(character.tag)+'</span>' : '') + '</div>';
      block.lines.forEach(function(line){ html += '<div class="message-line"><div class="message-content">'+parseFormatting(line.content)+'</div></div>'; });
      html += '</div></div>';
    }
  });
  if (visibleN < total) {
    html += '<div class="load-more-wrap"><button id="btn-reader-load-more" class="reader-load-btn">Carregar mais mensagens (' + (total - visibleN) + ' restantes) \u2B07</button></div>';
  }
  return html;
}
function setStatus(msg){ document.getElementById('reader-messages').innerHTML = '<div class="loading-hint">'+msg+'</div>'; }
function loadMoreReaderMessages(){
  var messages = episodeCache[activeChapterId];
  if (!messages) return;
  visibleCount += READER_BATCH_SIZE;
  document.getElementById('reader-messages').innerHTML = renderMessagesBatch(messages, visibleCount);
}
function showReaderChapter(id){
  var meta = null;
  for (var i=0;i<CHAPTERS_INDEX.length;i++){ if (CHAPTERS_INDEX[i].id===id){ meta = CHAPTERS_INDEX[i]; break; } }
  if (!meta) return;
  if (activeChapterId && activeChapterId !== id) { delete episodeCache[activeChapterId]; }
  activeChapterId = id;
  visibleCount = READER_BATCH_SIZE;
  document.querySelectorAll('.chapter-item').forEach(function(el){ el.classList.toggle('active', el.dataset.chapter===id); });
  document.getElementById('channel-title').textContent = meta.name;
  document.getElementById('channel-topic').textContent = meta.topic || '';
  var sidebar = document.getElementById('left-sidebar');
  if (sidebar) sidebar.classList.remove('mobile-open');
  if (episodeCache[id]) {
    document.getElementById('reader-messages').innerHTML = renderMessagesBatch(episodeCache[id], visibleCount);
    document.getElementById('reader-messages').scrollTop = 0;
    return;
  }
  setStatus('Carregando episódio…');
  fetch('data/episodes/' + id + '.json')
    .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data){
      (data.characters || []).forEach(function(c){ CHARACTERS_MAP[c.id] = c; });
      episodeCache[id] = data.messages || [];
      if (activeChapterId !== id) return;
      document.getElementById('reader-messages').innerHTML = renderMessagesBatch(episodeCache[id], visibleCount);
      document.getElementById('reader-messages').scrollTop = 0;
    })
    .catch(function(err){
      setStatus('Não foi possível carregar este episódio (' + err.message + '). Este arquivo precisa ser aberto via http(s) — ex: GitHub Pages — e não direto do disco (file://).');
    });
}
var CATEGORIES_INDEX = [];
function getFirstChapterId(){
  var uncategorized = CHAPTERS_INDEX.filter(function(c){ return !c.categoryId; });
  if (uncategorized.length) return uncategorized[0].id;
  for (var i=0;i<CATEGORIES_INDEX.length;i++){
    var inCat = CHAPTERS_INDEX.filter(function(c){ return c.categoryId === CATEGORIES_INDEX[i].id; });
    if (inCat.length) return inCat[0].id;
  }
  return CHAPTERS_INDEX.length ? CHAPTERS_INDEX[0].id : null;
}
function toggleReaderCategory(catId){
  document.querySelectorAll('.chapter-item[data-category="'+catId+'"]').forEach(function(el){ el.classList.toggle('hidden-by-collapse'); });
  var header = document.querySelector('.category-header[data-category="'+catId+'"]');
  if (header) header.classList.toggle('collapsed');
}
function buildSidebar(){
  var ul = document.querySelector('.chapters-list');
  var html = '';
  var firstId = getFirstChapterId();
  var uncategorized = CHAPTERS_INDEX.filter(function(c){ return !c.categoryId; });
  uncategorized.forEach(function(c){
    html += '<li class="chapter-item'+(c.id===firstId?' active':'')+'" data-chapter="'+c.id+'" title="'+escapeHtml(c.name)+'" onclick="showReaderChapter(\''+c.id+'\')"><span class="chapter-hash">#</span><span>'+escapeHtml(c.name)+'</span></li>';
  });
  CATEGORIES_INDEX.forEach(function(cat){
    var inCat = CHAPTERS_INDEX.filter(function(c){ return c.categoryId === cat.id; });
    if (!inCat.length) return;
    html += '<li class="category-header" data-category="'+cat.id+'" onclick="toggleReaderCategory(\''+cat.id+'\')"><span class="category-chevron">\u25BE</span><span>'+escapeHtml(cat.name)+'</span></li>';
    inCat.forEach(function(c){
      html += '<li class="chapter-item nested'+(c.id===firstId?' active':'')+'" data-chapter="'+c.id+'" data-category="'+cat.id+'" title="'+escapeHtml(c.name)+'" onclick="showReaderChapter(\''+c.id+'\')"><span class="chapter-hash">#</span><span>'+escapeHtml(c.name)+'</span></li>';
    });
  });
  ul.innerHTML = html;
}
document.addEventListener('click', function(e){
  var spoiler = e.target.closest('.spoiler');
  if (spoiler) { spoiler.classList.toggle('revealed'); return; }
  if (e.target.closest('#btn-reader-load-more')) { loadMoreReaderMessages(); return; }
});
fetch('data/chapters-index.json')
  .then(function(r){ return r.json(); })
  .then(function(index){
    CHAPTERS_INDEX = index.chapters || [];
    CATEGORIES_INDEX = index.categories || [];
    buildSidebar();
    var firstId = getFirstChapterId();
    if (firstId) showReaderChapter(firstId);
    else setStatus('Este livro ainda não tem episódios.');
  }).catch(function(err){
    setStatus('Não foi possível carregar o índice do livro (' + err.message + '). Abra este site via http(s) (ex: GitHub Pages), não direto do disco (file://).');
  });
</script>
</body>
